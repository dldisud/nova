<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>INKROAD | 내 서재</title>
  <meta name="description" content="INKROAD 내 서재 — 읽는 중인 작품, 찜한 작품, 구매한 작품을 관리하세요.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard/dist/web/static/pretendard.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
  <link rel="stylesheet" href="assets/pc.css">
</head>
<body class="pc-desktop store-light">
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="homepage_pc.html">
        <span class="brand-mark material-symbols-outlined">auto_stories</span>
        <span class="brand-copy">
          <strong class="brand-name">INKROAD</strong>
          <span class="brand-sub">글로벌 웹소설 스토어</span>
        </span>
      </a>
      <nav class="nav">
        <a class="nav-link" data-nav-link href="homepage_pc.html" data-i18n="nav.store">스토어</a>
        <a class="nav-link" data-nav-link href="search_pc.html" data-i18n="nav.search">탐색</a>
        <a class="nav-link" data-nav-link href="my_library_pc.html" data-i18n="nav.my_library">내 서재</a>
        <a class="nav-link nav-link-sale" href="homepage_pc.html#sale-section" data-i18n="nav.sale">세일</a>
      </nav>
      <form class="store-top-search" action="search_pc.html">
        <span class="material-symbols-outlined">search</span>
        <input type="search" name="q" placeholder="작품명, 작가, 태그 검색">
      </form>
      <div data-lang-picker></div>
      <div class="topbar-user-menu" data-user-menu>
        <button class="topbar-user-trigger" data-topbar-auth data-i18n="nav.login" type="button">로그인</button>
        <div class="topbar-user-dropdown" data-user-dropdown hidden>
          <a class="topbar-dropdown-item" href="my_library_pc.html"><span class="material-symbols-outlined">auto_stories</span>내 서재</a>
          <a class="topbar-dropdown-item" href="profile_settings_pc.html"><span class="material-symbols-outlined">person</span>내 정보</a>
          <a class="topbar-dropdown-item" href="creator_dashboard_pc.html" data-menu-creator><span class="material-symbols-outlined">edit_note</span>크리에이터</a>
          <a class="topbar-dropdown-item" href="admin_dashboard_pc.html" data-menu-admin hidden><span class="material-symbols-outlined">shield_person</span>관리자</a>
          <div class="topbar-dropdown-divider"></div>
          <button class="topbar-dropdown-item" type="button" data-menu-logout><span class="material-symbols-outlined">logout</span>로그아웃</button>
        </div>
      </div>
    </div>
  </header>

  <main class="pc-page store-home">
    <div class="store-shell" style="padding-top:32px;">
      <div class="store-section-head" style="margin-bottom:24px;">
        <div>
          <h1 class="store-section-title">내 서재</h1>
        </div>
        <div class="library-stats" data-library-stats></div>
      </div>

      <div class="library-tabs">
        <button class="filter-chip" type="button" data-tab-target="reading" data-state="include">읽는 중</button>
        <button class="filter-chip" type="button" data-tab-target="wishlist">찜한 작품</button>
        <button class="filter-chip" type="button" data-tab-target="purchased">구매한 작품</button>
      </div>

      <div data-tab-panel="reading">
        <div class="library-list" data-library-reading></div>
      </div>
      <div data-tab-panel="wishlist" style="display:none;">
        <div class="library-list" data-library-wishlist></div>
      </div>
      <div data-tab-panel="purchased" style="display:none;">
        <div class="library-list" data-library-purchased></div>
      </div>

      <footer class="store-footer">
        <div class="footer-brand">
          <span class="brand-mark material-symbols-outlined">auto_stories</span>
          <strong>INKROAD</strong>
        </div>
        <div class="footer-links">
          <a href="#">이용약관</a>
          <a href="#">개인정보처리방침</a>
          <a href="#">고객센터</a>
          <a href="creator_dashboard_pc.html">크리에이터</a>
        </div>
        <div class="footer-copy">
          <span>&copy; <span data-year></span> INKROAD. All rights reserved.</span>
        </div>
      </footer>
    </div>
  </main>

  <script src="assets/i18n.js"></script>
  <script src="assets/supabase-config.js"></script>
  <script src="assets/app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/supabase-live.js"></script>
  <script src="assets/store-redesign.js"></script>
</body>
</html>
