<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>INKROAD | 내 서재</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/animations.css">
  <link rel="stylesheet" href="assets/styles.css">
  <link rel="stylesheet" href="assets/pc.css">
</head>
<body class="pc-desktop store-dark">
  <div class="spotify-shell top-nav-shell">
    <header class="top-nav-header">
      <a class="spotify-logo" href="homepage_pc.html">
        <i class="bx bx-book-open"></i> INKROAD
      </a>
      <nav class="top-nav-menu">
        <a class="spotify-nav-item" href="homepage_pc.html" data-i18n="nav.store">홈</a>
        <a class="spotify-nav-item" href="search_pc.html" data-i18n="nav.search">탐색</a>
        <a class="spotify-nav-item active" href="my_library_pc.html" data-i18n="nav.my_library">내 서재</a>
      </nav>
      <div style="flex:1;"></div>
      <form action="search_pc.html" style="position:relative;">
        <input type="text" class="top-search" name="q" placeholder="작품, 작가 검색...">
      </form>
      <div data-lang-picker></div>
      <a class="login-btn" data-auth-link href="auth_pc.html" data-i18n="nav.login">로그인</a>
    </header>

    <main class="top-nav-main">
      <section class="spotify-section">
        <div style="margin-bottom:24px; display:flex; justify-content:space-between; align-items:flex-end;">
          <div>
            <h1 class="spotify-section-title" style="margin-bottom:0;">내 서재</h1>
          </div>
          <div class="library-stats" data-library-stats style="color:#b3b3b3;"></div>
        </div>

        <div class="library-tabs" style="display:flex; gap:8px; margin-bottom:32px;">
          <button class="filter-chip" type="button" data-tab-target="reading" data-state="include">읽는 중</button>
          <button class="filter-chip" type="button" data-tab-target="wishlist">찜한 작품</button>
          <button class="filter-chip" type="button" data-tab-target="purchased">구매한 작품</button>
        </div>

        <div data-tab-panel="reading">
          <div class="spotify-grid" data-library-reading></div>
        </div>
        <div data-tab-panel="wishlist" style="display:none;">
          <div class="spotify-grid" data-library-wishlist></div>
        </div>
        <div data-tab-panel="purchased" style="display:none;">
          <div class="spotify-grid" data-library-purchased></div>
        </div>
      </section>

      <footer class="store-footer" style="max-width:1440px; margin: 40px auto 0; border-top: 1px solid #282828; padding-top: 24px; color: #b3b3b3; display: flex; justify-content: space-between;">
        <span>© <span data-year></span> INKROAD</span>
        <div style="display:flex; gap:16px;">
          <a href="#" style="color:#b3b3b3; text-decoration:none;">이용약관</a>
          <a href="#" style="color:#b3b3b3; text-decoration:none;">개인정보</a>
        </div>
      </footer>
    </main>
  </div>

  <script src="assets/i18n.js"></script>
  <script src="assets/supabase-config.js"></script>
  <script src="assets/app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/supabase-live.js"></script>
  <script src="assets/store-redesign.js"></script>
</body>
</html>
