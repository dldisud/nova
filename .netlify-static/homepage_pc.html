<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>INKROAD | 글로벌 웹소설 스토어</title>
  <meta name="description" content="INKROAD - 한국 웹소설을 세계로. 판타지, 로맨스, 회귀 등 다양한 장르의 웹소설을 만나보세요.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard/dist/web/static/pretendard.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
  <link rel="stylesheet" href="assets/pc.css">
</head>
<body class="pc-desktop store-light">
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="homepage_pc.html">
        <span class="brand-mark material-symbols-outlined">auto_stories</span>
        <span class="brand-copy">
          <strong class="brand-name">INKROAD</strong>
          <span class="brand-sub">글로벌 웹소설 스토어</span>
        </span>
      </a>

      <nav class="nav">
        <a class="nav-link" data-nav-link href="homepage_pc.html" data-i18n="nav.store">스토어</a>
        <a class="nav-link" data-nav-link href="search_pc.html" data-i18n="nav.search">탐색</a>
        <a class="nav-link" data-nav-link href="my_library_pc.html" data-i18n="nav.my_library">내 서재</a>
        <a class="nav-link nav-link-sale" href="homepage_pc.html#sale-section" data-i18n="nav.sale">세일</a>
      </nav>

      <form class="store-top-search" action="search_pc.html">
        <span class="material-symbols-outlined">search</span>
        <input type="search" name="q" placeholder="작품명, 작가, 태그 검색">
      </form>

      <div data-lang-picker></div>
      <a class="button ghost button-login" href="my_library_pc.html" data-i18n="nav.login">로그인</a>
    </div>
  </header>

  <main class="pc-page store-home">
    <!-- Hero Band -->
    <section class="hero-band" data-hero-band>
      <div class="store-shell">
        <div class="hero-grid">
          <div class="hero-copy">
            <div class="hero-badges">
              <span class="sale-badge hero-sale-badge"></span>
              <span class="muted-badge hero-direction-badge"></span>
              <span class="muted-badge hero-genre-badge"></span>
            </div>
            <h1 class="hero-title">
              <span class="hero-title-main"></span><br>
              <span class="hero-title-sub"></span>
            </h1>
            <p class="hero-description"></p>
            <div class="hero-meta"></div>
            <div class="hero-actions">
              <a class="button primary" data-hero-read href="novel_viewer_pc.html">1화 읽기</a>
              <button class="button secondary button-heart" type="button" data-hero-bookmark aria-label="찜하기">
                <span class="material-symbols-outlined">favorite</span>
                <span data-bookmark-label data-default-label="찜하기">찜하기</span>
              </button>
            </div>
          </div>
          <div class="hero-cover-wrap">
            <img class="hero-cover" src="https://placehold.co/180x250/333/fff?text=InkRoad" alt="표지">
          </div>
        </div>
      </div>
    </section>

    <div class="store-shell" style="padding-top:36px;">

      <!-- Sale banner -->
      <div class="sale-banner" data-home-sale-banner></div>

      <!-- Genre grid -->
      <section class="store-section genre-section">
        <div class="genre-grid" data-genre-grid></div>
      </section>

      <!-- 지금 읽을 만한 (Free) -->
      <section class="store-section">
        <div class="store-section-head">
          <h2 class="store-section-title">지금 읽을 만한</h2>
          <a class="link-inline" href="search_pc.html">전체 보기 <span class="material-symbols-outlined">arrow_forward</span></a>
        </div>
        <div class="novel-grid free-grid"></div>
      </section>

      <!-- 할인 작품 (Sale) -->
      <section class="store-section" id="sale-section">
        <div class="store-section-head">
          <h2 class="store-section-title">할인 작품</h2>
          <a class="link-inline" href="search_pc.html">전체 보기 <span class="material-symbols-outlined">arrow_forward</span></a>
        </div>
        <div class="novel-grid sale-grid"></div>
      </section>

      <footer class="store-footer">
        <span>© <span data-year></span> INKROAD</span>
        <div class="bottom-meta">
          <a href="#">이용약관</a>
          <a href="#">개인정보</a>
          <a href="#">고객센터</a>
        </div>
      </footer>
    </div>
  </main>

  <script src="assets/i18n.js"></script>
  <script src="assets/supabase-config.js"></script>
  <script src="assets/app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/supabase-live.js"></script>
  <script src="assets/store-redesign.js"></script>
</body>
</html>
