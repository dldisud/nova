<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>INKROAD | 탐색</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard/dist/web/static/pretendard.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
  <link rel="stylesheet" href="assets/pinterest.css">
</head>
<body class="mobile-app store-light mobile-search-page">
  <header class="mobile-header">
    <a class="brand" href="homepage.html">
      <span class="brand-mark material-symbols-outlined">auto_stories</span>
      <strong class="brand-name">INKROAD</strong>
    </a>
    <div class="mobile-header-actions">
      <div data-lang-picker></div>
      <button class="mobile-header-icon" data-mobile-user-btn type="button"><span class="material-symbols-outlined">person</span></button>
    </div>
  </header>

  <main class="mobile-content">
    <form class="mobile-search-input" action="search.html">
      <span class="material-symbols-outlined">search</span>
      <input type="search" name="q" placeholder="작품명, 작가, 태그로 검색...">
    </form>

    <div class="mobile-chip-scroll" data-mobile-genre-chips>
      <button class="filter-chip" type="button" data-genre="" data-state="include">전체</button>
      <button class="filter-chip" type="button" data-genre="판타지">판타지</button>
      <button class="filter-chip" type="button" data-genre="로맨스">로맨스</button>
      <button class="filter-chip" type="button" data-genre="회귀">회귀</button>
      <button class="filter-chip" type="button" data-genre="아카데미">아카데미</button>
      <button class="filter-chip" type="button" data-genre="하렘">하렘</button>
      <button class="filter-chip" type="button" data-genre="피폐">피폐</button>
    </div>

    <div class="mobile-filter-row">
      <button class="mobile-filter-btn" type="button" data-filter="origin">출처 ▾</button>
      <button class="mobile-filter-btn" type="button" data-filter="status">상태 ▾</button>
      <button class="mobile-filter-btn" type="button" data-filter="sort">정렬 ▾</button>
    </div>

    <section class="mobile-store-panel mobile-search-panel">
      <div class="mobile-store-panel-head">
        <h2 class="mobile-store-panel-title">작품 목록</h2>
        <div class="mobile-result-count" data-mobile-result-count></div>
      </div>
      <div class="mobile-search-results" data-mobile-search-results></div>
    </section>
  </main>

  <nav class="mobile-tab-bar">
    <a class="tab-item" href="homepage.html">
      <span class="material-symbols-outlined">home</span>
      <span class="tab-label" data-i18n="nav.home">홈</span>
    </a>
    <a class="tab-item active" href="search.html">
      <span class="material-symbols-outlined">search</span>
      <span class="tab-label" data-i18n="nav.search">탐색</span>
    </a>
    <a class="tab-item" href="my_library.html">
      <span class="material-symbols-outlined">auto_stories</span>
      <span class="tab-label" data-i18n="nav.my_library">서재</span>
    </a>
    <button class="tab-item" data-mobile-user-btn type="button">
      <span class="material-symbols-outlined">person</span>
      <span class="tab-label">MY</span>
    </button>
  </nav>

  <div class="mobile-user-sheet" data-mobile-user-sheet hidden>
    <div class="mobile-sheet-backdrop" data-mobile-sheet-close></div>
    <div class="mobile-sheet-panel">
      <div class="mobile-sheet-header">
        <span class="mobile-sheet-title" data-mobile-user-name>로그인</span>
        <button class="mobile-sheet-close-btn" data-mobile-sheet-close type="button"><span class="material-symbols-outlined">close</span></button>
      </div>
      <div class="mobile-sheet-body">
        <a class="mobile-sheet-item" href="my_library.html"><span class="material-symbols-outlined">auto_stories</span>내 서재</a>
        <a class="mobile-sheet-item" data-mobile-menu-profile href="profile_settings.html"><span class="material-symbols-outlined">person</span>내 정보</a>
        <a class="mobile-sheet-item" data-mobile-menu-payment href="payment.html"><span class="material-symbols-outlined">account_balance_wallet</span>코인 충전</a>
        <a class="mobile-sheet-item" href="creator_dashboard_pc.html" data-mobile-menu-creator><span class="material-symbols-outlined">edit_note</span>크리에이터</a>
        <a class="mobile-sheet-item" href="admin_dashboard_pc.html" data-mobile-menu-admin hidden><span class="material-symbols-outlined">shield_person</span>관리자</a>
        <div class="mobile-sheet-divider"></div>
        <button class="mobile-sheet-item" data-mobile-menu-logout type="button"><span class="material-symbols-outlined">logout</span>로그아웃</button>
      </div>
    </div>
  </div>

  <script src="assets/i18n.js"></script>
  <script src="assets/supabase-config.js"></script>
  <script src="assets/app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/supabase-live.js"></script>
  <script src="assets/store-redesign.js"></script>
  <script src="assets/mobile-auth.js"></script>
</body>
</html>
