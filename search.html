<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>INKROAD | 탐색</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/animations.css">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="store-dark" style="background:#000; color:#fff;">
  <!-- Topbar -->
  <header style="display:flex; justify-content:space-between; align-items:center; padding:16px 20px; background:rgba(0,0,0,0.8); backdrop-filter:blur(10px); position:fixed; top:0; left:0; right:0; z-index:100;">
    <a href="homepage.html" style="font-size:18px; font-weight:800; color:#FFC55F; display:flex; align-items:center; gap:6px; text-decoration:none;">
      <i class="bx bx-book-open"></i> INKROAD
    </a>
    <div style="display:flex; gap:12px; align-items:center;">
      <div data-lang-picker></div>
      <a href="auth_pc.html" style="width:36px; height:36px; border-radius:50%; background:#242424; display:flex; align-items:center; justify-content:center; color:#fff; text-decoration:none;" data-auth-link>
        <i class="bx bx-user"></i>
      </a>
    </div>
  </header>

  <main style="padding: 72px 0 90px; background: #000; min-height: 100vh;">
    <form class="mobile-search-input" action="search.html" style="padding:0 16px 16px; margin-top:8px;">
      <div style="position:relative;">
        <i class="bx bx-search" style="position:absolute; left:16px; top:50%; transform:translateY(-50%); color:#888;"></i>
        <input type="search" name="q" placeholder="작품명, 작가, 태그로 검색..." style="width:100%; padding:12px 16px 12px 42px; border-radius:24px; background:#242424; border:none; color:#fff; font-size:14px;">
      </div>
    </form>

    <div class="category-pills" data-mobile-genre-chips>
      <button class="pill" type="button" data-genre="" data-state="include">전체</button>
      <button class="pill" type="button" data-genre="판타지">판타지</button>
      <button class="pill" type="button" data-genre="로맨스">로맨스</button>
      <button class="pill" type="button" data-genre="회귀">회귀</button>
      <button class="pill" type="button" data-genre="아카데미">아카데미</button>
      <button class="pill" type="button" data-genre="하렘">하렘</button>
      <button class="pill" type="button" data-genre="피폐">피폐</button>
    </div>

    <div class="mobile-filter-row" style="padding:0 16px 16px; display:flex; gap:8px;">
      <button class="pill" type="button" data-filter="origin" style="padding:6px 12px; font-size:12px;">출처 ▾</button>
      <button class="pill" type="button" data-filter="status" style="padding:6px 12px; font-size:12px;">상태 ▾</button>
      <button class="pill" type="button" data-filter="sort" style="padding:6px 12px; font-size:12px;">정렬 ▾</button>
    </div>

    <div style="padding:0 16px 16px; font-size:12px; color:#b3b3b3;" data-mobile-result-count></div>

    <div class="masonry-grid" data-mobile-search-results></div>
  </main>

  <!-- Bottom Navigation -->
  <nav style="display:flex; justify-content:space-around; align-items:center; padding:12px 20px 24px; background:rgba(18,18,18,0.9); backdrop-filter:blur(10px); position:fixed; bottom:0; left:0; right:0; border-top:1px solid #282828; z-index:100;">
    <a href="homepage.html" style="display:flex; flex-direction:column; align-items:center; gap:4px; color:#888; font-size:10px; font-weight:700; text-decoration:none;">
      <i class="bx bx-home-alt" style="font-size:24px;"></i>
      <span>홈</span>
    </a>
    <a href="search.html" style="display:flex; flex-direction:column; align-items:center; gap:4px; color:#FFC55F; font-size:10px; font-weight:700; text-decoration:none;">
      <i class="bx bxs-search" style="font-size:24px;"></i>
      <span>탐색</span>
    </a>
    <a href="my_library.html" style="display:flex; flex-direction:column; align-items:center; gap:4px; color:#888; font-size:10px; font-weight:700; text-decoration:none;">
      <i class="bx bx-book" style="font-size:24px;"></i>
      <span>서재</span>
    </a>
    <a href="auth_pc.html" style="display:flex; flex-direction:column; align-items:center; gap:4px; color:#888; font-size:10px; font-weight:700; text-decoration:none;">
      <i class="bx bx-user" style="font-size:24px;"></i>
      <span>MY</span>
    </a>
  </nav>

  <script src="assets/i18n.js"></script>
  <script src="assets/supabase-config.js"></script>
  <script src="assets/app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/supabase-live.js"></script>
  <script src="assets/store-redesign.js"></script>
</body>
</html>
