<style>
  /* Mobile Pinterest Inspired Dark Theme with Gold & Red */
  .pinterest-shell {
    width: 375px;
    height: 812px;
    background: #000000;
    color: #fff;
    font-family: Pretendard, sans-serif;
    border-radius: 36px;
    border: 8px solid #333;
    overflow: hidden;
    margin: 0 auto 24px;
    display: flex;
    flex-direction: column;
    position: relative;
    box-shadow: 0 24px 48px rgba(0,0,0,0.5);
  }
  
  /* Topbar */
  .pinterest-topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10;
  }
  .pinterest-logo {
    font-size: 18px;
    font-weight: 800;
    color: #FFC55F; /* Gold */
    display: flex;
    align-items: center;
    gap: 6px;
  }
  
  /* Main Content Area */
  .pinterest-main {
    flex: 1;
    overflow-y: auto;
    padding: 72px 12px 90px; /* space for topbar and bottom nav */
    background: #000;
  }
  
  /* Masonry Grid (simulated with CSS columns) */
  .masonry-grid {
    column-count: 2;
    column-gap: 12px;
  }
  
  .masonry-item {
    break-inside: avoid;
    margin-bottom: 12px;
    background: #121212;
    border-radius: 12px;
    overflow: hidden;
    position: relative;
  }
  
  /* Different aspect ratios for masonry effect */
  .masonry-item.tall .masonry-cover { aspect-ratio: 0.6; }
  .masonry-item.short .masonry-cover { aspect-ratio: 0.8; }
  .masonry-item.medium .masonry-cover { aspect-ratio: 0.7; }
  
  .masonry-cover {
    width: 100%;
    object-fit: cover;
    display: block;
  }
  
  .masonry-info {
    padding: 10px;
  }
  
  .masonry-title {
    font-size: 14px;
    font-weight: 800;
    margin-bottom: 4px;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  
  .masonry-author {
    font-size: 12px;
    color: #b3b3b3;
  }
  
  /* Red Badge inside image */
  .red-badge-masonry {
    position: absolute;
    top: 8px;
    left: 8px;
    background: #E50914; /* Red */
    color: #fff;
    font-size: 10px;
    padding: 4px 6px;
    border-radius: 4px;
    font-weight: 800;
    z-index: 2;
  }
  
  /* Category Pills */
  .category-pills {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 16px;
    margin-bottom: 8px;
    scrollbar-width: none; /* Firefox */
  }
  .category-pills::-webkit-scrollbar {
    display: none; /* Chrome */
  }
  .pill {
    padding: 8px 16px;
    background: #242424;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 700;
    white-space: nowrap;
    color: #fff;
  }
  .pill.active {
    background: #FFC55F;
    color: #000;
  }
  
  /* Bottom Navigation */
  .pinterest-bottom-nav {
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 12px 20px 24px;
    background: rgba(18, 18, 18, 0.9);
    backdrop-filter: blur(10px);
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    border-top: 1px solid #282828;
    z-index: 10;
  }
  .nav-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    color: #888;
    font-size: 10px;
    font-weight: 700;
    cursor: pointer;
  }
  .nav-btn.active {
    color: #FFC55F;
  }
  .nav-icon {
    font-size: 24px;
  }
</style>
