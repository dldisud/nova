<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>INKROAD | 코인 충전</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard/dist/web/static/pretendard.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
  <link rel="stylesheet" href="assets/mobile-payment.css">
</head>
<body class="mobile-app store-light mobile-payment-page">
  <header class="mh-header">
    <a class="back-btn" href="homepage.html"><span class="material-symbols-outlined">arrow_back</span></a>
    <span class="mh-header-title">코인 충전</span>
    <div class="spacer"></div>
  </header>

  <main class="mh-content mobile-payment-shell" data-payment-shell>
    <div class="payment-balance-card">
      <span class="balance-label">보유 코인</span>
      <strong class="balance-value" data-payment-balance>0 G</strong>
    </div>

    <h2 class="tier-title">충전 패키지</h2>

    <div class="tier-list">
      <div class="tier-card" data-tier="500" data-amount="5000">
        <div class="tier-info">
          <span class="tier-amount">500 G</span>
          <span class="tier-price">₩5,000</span>
        </div>
        <button class="tier-btn" data-payment-buy>충전</button>
      </div>

      <div class="tier-card" data-tier="1000" data-amount="10000">
        <div class="tier-info">
          <span class="tier-amount">1,000 G</span>
          <span class="tier-price">₩10,000</span>
          <span class="tier-bonus">+100 G 보너스</span>
        </div>
        <button class="tier-btn" data-payment-buy>충전</button>
      </div>

      <div class="tier-card featured" data-tier="5000" data-amount="50000">
        <div class="tier-badge">인기</div>
        <div class="tier-info">
          <span class="tier-amount">5,000 G</span>
          <span class="tier-price">₩50,000</span>
          <span class="tier-bonus">+1,000 G 보너스</span>
        </div>
        <button class="tier-btn primary" data-payment-buy>충전</button>
      </div>

      <div class="tier-card" data-tier="10000" data-amount="100000">
        <div class="tier-info">
          <span class="tier-amount">10,000 G</span>
          <span class="tier-price">₩100,000</span>
          <span class="tier-bonus">+2,500 G 보너스</span>
        </div>
        <button class="tier-btn" data-payment-buy>충전</button>
      </div>
    </div>

    <div class="payment-notice">
      <h3>결제 안내</h3>
      <ul>
        <li>충전된 코인은 5년간 유효합니다.</li>
        <li>모든 결제는 PG사를 통해 안전하게 처리됩니다.</li>
        <li>미사용 코인은 충전 후 7일 이내 환불 가능합니다.</li>
      </ul>
    </div>
  </main>

  <nav class="mobile-tab-bar" aria-label="주요 탐색">
    <a class="tab-item" href="homepage.html">
      <span class="material-symbols-outlined">home</span>
      <span class="tab-label">홈</span>
    </a>
    <a class="tab-item" href="search.html">
      <span class="material-symbols-outlined">search</span>
      <span class="tab-label">탐색</span>
    </a>
    <a class="tab-item" href="my_library.html">
      <span class="material-symbols-outlined">auto_stories</span>
      <span class="tab-label">서재</span>
    </a>
    <button class="tab-item" type="button" data-mobile-user-btn>
      <span class="material-symbols-outlined">person</span>
      <span class="tab-label">MY</span>
    </button>
  </nav>

  <script src="assets/i18n.js"></script>
  <script src="assets/supabase-config.js"></script>
  <script src="assets/app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/supabase-live.js"></script>
  <script src="assets/mobile-payment.js"></script>
</body>
</html>
