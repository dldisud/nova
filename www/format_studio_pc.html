<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INKROAD | 연출 서식 도우미</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css" />
  <link rel="stylesheet" href="assets/pc.css" />
  <style>
    .format-studio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .format-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; background: var(--surface); border: 1px solid var(--border-soft); border-radius: 12px; padding: 12px; cursor: pointer; transition: all 0.2s; }
    .format-btn:hover { border-color: rgba(var(--gold-rgb), 0.3); background: rgba(var(--gold-rgb), 0.05); transform: translateY(-2px); }
    .format-icon { font-size: 24px; transition: transform 0.2s; }
    .format-btn:hover .format-icon { transform: scale(1.1); }
    .format-label { font-size: 11px; font-weight: 700; color: var(--fg-3); transition: color 0.2s; }
    .format-btn:hover .format-label { color: var(--gold); }
    .editor-preview-split { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .split-col { display: flex; flex-direction: column; gap: 12px; }
    .split-header { display: flex; align-items: center; justify-content: space-between; }
    .split-title { font-size: 14px; font-weight: 700; color: var(--fg-2); }
    .split-meta { font-size: 11px; color: var(--fg-3); }
    .format-textarea { flex: 1; min-height: 500px; resize: vertical; border: 1px solid var(--border-soft); border-radius: 12px; background: var(--surface); padding: 16px; font-family: monospace; font-size: 14px; line-height: 1.8; color: var(--fg-soft); outline: none; transition: border-color 0.2s; }
    .format-textarea:focus { border-color: var(--gold); }
    .format-preview-box { flex: 1; min-height: 500px; max-height: 800px; overflow-y: auto; border: 1px solid var(--border-soft); border-radius: 12px; background: #0c0c0c; padding: 24px; }
    .preview-placeholder { text-align: center; color: rgba(255, 255, 255, 0.3); font-size: 14px; margin-top: 100px; }
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; margin-top: 12px; }
    .gallery-card { border: 1px solid var(--border-soft); border-radius: 12px; background: var(--surface); overflow: hidden; }
    .gallery-head { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid var(--border-soft); }
    .gallery-title { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; color: var(--fg-2); }
    .gallery-insert { background: transparent; border: none; color: var(--gold); font-size: 11px; font-weight: 700; cursor: pointer; padding: 0; }
    .gallery-insert:hover { text-decoration: underline; }
    .gallery-body { background: #0c0c0c; padding: 12px 16px; min-height: 60px; }
  </style>
</head>
<body class="pc-desktop store-light">
  <div class="creator-layout">
    <aside class="creator-sidebar">
      <div class="creator-sidebar-brand">
        <span class="brand-mark material-symbols-outlined">auto_stories</span>
        <span class="brand-copy">
          <strong class="brand-name">INKROAD</strong>
          <span class="brand-sub">크리에이터</span>
        </span>
      </div>
      <nav class="creator-sidebar-nav">
        <a class="creator-nav-link" href="creator_dashboard_pc.html">
          <span class="material-symbols-outlined">auto_stories</span> 작품 관리
        </a>
        <a class="creator-nav-link" href="author_dashboard_pc.html">
          <span class="material-symbols-outlined">bar_chart</span> 통계
        </a>
        <a class="creator-nav-link" href="profile_settings_pc.html">
          <span class="material-symbols-outlined">person</span> 내 정보
        </a>
        <a class="creator-nav-link" href="novel_upload_pc.html">
          <span class="material-symbols-outlined">add_circle</span> 작품 등록
        </a>
        <a class="creator-nav-link" href="episode_upload_pc.html">
          <span class="material-symbols-outlined">upload</span> 회차 업로드
        </a>
        <a class="creator-nav-link active" href="format_studio_pc.html">
          <span class="material-symbols-outlined">design_services</span> 연출 도우미
        </a>
      </nav>
      <div class="creator-sidebar-footer">
        <div data-lang-picker></div>
        <a href="homepage_pc.html">← 스토어로 돌아가기</a>
      </div>
    </aside>

    <main class="creator-main">
      <div class="creator-main-head">
        <div class="creator-main-copy">
          <h1 class="creator-main-title">연출 서식 도우미</h1>
          <p class="creator-main-sub">웹소설 연출 서식을 쉽게 삽입하고 미리보기할 수 있습니다.</p>
        </div>
        <button class="button secondary" type="button" data-format-copy>📋 본문 복사</button>
      </div>

      <div class="format-studio-grid" data-format-buttons>
        <!-- Buttons injected by JS -->
      </div>

      <div class="editor-preview-split">
        <div class="split-col">
          <div class="split-header">
            <div class="split-title">✏️ 편집</div>
            <div class="split-meta" data-format-length>0자</div>
          </div>
          <textarea class="format-textarea" data-format-input spellcheck="false" placeholder="본문을 입력하고 위 버튼으로 연출을 삽입하세요.

예시:
그는 천천히 눈을 떴다.

:::status 상태창
레벨: 1
민첩: 99
:::"></textarea>
        </div>

        <div class="split-col">
          <div class="split-header">
            <div class="split-title">👁 독자 화면 미리보기</div>
          </div>
          <div class="format-preview-box" data-format-preview>
            <p class="preview-placeholder">왼쪽에 본문을 입력하면 독자에게 보이는 화면이 표시됩니다.</p>
          </div>
        </div>
      </div>

      <div style="margin-top: 40px;">
        <h3 class="split-title">📖 연출 예시 갤러리</h3>
        <div class="gallery-grid" data-format-gallery>
          <!-- Gallery injected by JS -->
        </div>
      </div>

    </main>
  </div>

  <script src="assets/i18n.js"></script>
  <script src="assets/supabase-config.js"></script>
  <script src="assets/app.js"></script>
  <script src="assets/format-studio.js"></script>
</body>
</html>
