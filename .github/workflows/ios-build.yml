name: iOS Build (Capacitor)

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Unique build identifier'
        required: true
        type: string

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Sync Capacitor
        run: npx cap sync

      - name: Build IPA
        env:
          BUILD_ID: ${{ inputs.build_id }}
        run: |
          set -e
          cd ios/App

          DERIVED_DATA_PATH="${GITHUB_WORKSPACE}/DerivedData"

          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=YES \
            build

          APP_PATH=$(find "$DERIVED_DATA_PATH" -name "*.app" -type d | head -1)
          echo "Found app: $APP_PATH"

          if [ -n "$APP_PATH" ]; then
            cd ../..
            mkdir -p build/Payload
            cp -R "$APP_PATH" build/Payload/
            cd build
            zip -rq "${BUILD_ID}.ipa" Payload
            rm -rf Payload
            echo "Created IPA: build/${BUILD_ID}.ipa"
          else
            echo "Error: No .app found in DerivedData"
            find "$DERIVED_DATA_PATH" -name "*.app" -type d 2>/dev/null || true
            exit 1
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: build/*.ipa
          retention-days: 7
          if-no-files-found: error
