name: iOS Build (Capacitor)

on:
  push:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      build_id:
        description: Unique build identifier
        required: true
        type: string
      ios_path:
        description: Path to iOS project
        required: false
        type: string
        default: "ios/App"
      scheme:
        description: Xcode scheme to build
        required: false
        type: string
        default: "App"
      use_signing:
        description: Enable code signing
        required: false
        type: boolean
        default: false
      configuration:
        description: Build configuration
        required: false
        type: string
        default: "Release"
      flutter_version:
        description: Flutter version
        required: false
        type: string
        default: ""

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "./package-lock.json"

      - name: Install dependencies
        run: npm install

      - name: Sync mob web assets into www
        run: |
          if [ -d mob ]; then
            rm -rf www
            mkdir -p www
            rsync -a --delete mob/ www/
            echo "Synced mob/ -> www/"
          elif [ -d www ]; then
            echo "mob/ not found, using checked-in www/ as-is"
          else
            echo "Error: neither mob/ nor www/ exists"
            exit 1
          fi
          test -f www/index.html
          test -f www/homepage.html

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Create or sync Capacitor iOS project
        run: |
          if [ ! -d ios/App ]; then
            npx cap add ios
          fi
          npx cap sync ios

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Build unsigned app
        run: |
          set -e
          cd ios/App
          DERIVED_DATA_PATH="${GITHUB_WORKSPACE}/DerivedData"
          SCHEME_NAME="${{ inputs.scheme }}"
          CONFIGURATION_NAME="${{ inputs.configuration }}"

          xcodebuild build \
            -workspace "App.xcworkspace" \
            -scheme "$SCHEME_NAME" \
            -configuration "$CONFIGURATION_NAME" \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=YES \
            COMPILER_INDEX_STORE_ENABLE=NO

          APP_PATH=$(find "$DERIVED_DATA_PATH/Build/Products" -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: No .app found."
            exit 1
          fi

          cd ../..
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          cd build
          zip -rq "${{ inputs.build_id || github.sha }}.ipa" Payload
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/*.ipa
          retention-days: 5
          if-no-files-found: error
