name: iOS Build

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Unique build identifier'
        required: true
        type: string
      ios_path:
        description: 'Path to iOS project (e.g., "ios" for React Native)'
        required: false
        type: string
        default: 'ios'
      scheme:
        description: 'Xcode scheme to build (auto-detected if empty)'
        required: false
        type: string
        default: 'InkRoad'
      use_signing:
        description: 'Enable code signing (requires secrets to be configured)'
        required: false
        type: boolean
        default: false
      configuration:
        description: 'Build configuration (Debug is faster, Release for production)'
        required: false
        type: string
        default: 'Debug'

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Debug - List files
        run: |
          echo "Root directory:"
          ls -la
          echo "iOS directory:"
          ls -la ios || echo "ios folder not found"
          echo "iOS/InkRoadApp directory:"
          ls -la ios/InkRoadApp || echo "InkRoadApp folder not found"

      - name: Setup Tuist
        run: |
          brew install tuist || true
          cd ios
          echo "Running tuist install..."
          tuist install --no-update || true
          echo "Running tuist generate..."
          tuist generate --no-open || true
          echo "Generated files:"
          ls -la
          ls -la *.xcworkspace 2>/dev/null || echo "No workspace found"
          ls -la *.xcodeproj 2>/dev/null || echo "No project found"

      - name: Build IPA
        env:
          BUILD_ID: ${{ inputs.build_id }}
          IOS_PATH: ${{ inputs.ios_path }}
          SCHEME: ${{ inputs.scheme }}
          USE_SIGNING: ${{ inputs.use_signing }}
          CONFIGURATION: ${{ inputs.configuration }}
        run: |
          set -e
          cd ios
          
          WORKSPACE=$(find . -maxdepth 2 -name "*.xcworkspace" | head -1)
          PROJECT=$(find . -maxdepth 2 -name "*.xcodeproj" | head -1)
          
          echo "Workspace: $WORKSPACE"
          echo "Project: $PROJECT"
          
          DERIVED_DATA_PATH="${GITHUB_WORKSPACE}/DerivedData"
          
          if [ -n "$WORKSPACE" ]; then
            BUILD_CMD="xcodebuild -workspace $WORKSPACE"
            SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          elif [ -n "$PROJECT" ]; then
            BUILD_CMD="xcodebuild -project $PROJECT"
            SCHEME=$(basename "$PROJECT" .xcodeproj)
          else
            echo "Error: No workspace or project found"
            exit 1
          fi
          
          echo "Using scheme: $SCHEME"
          
          BUILD_CMD="$BUILD_CMD -scheme $SCHEME"
          BUILD_CMD="$BUILD_CMD -configuration $CONFIGURATION"
          BUILD_CMD="$BUILD_CMD -destination 'generic/platform=iOS Simulator'"
          BUILD_CMD="$BUILD_CMD -derivedDataPath $DERIVED_DATA_PATH"
          BUILD_CMD="$BUILD_CMD CODE_SIGNING_ALLOWED=NO"
          BUILD_CMD="$BUILD_CMD CODE_SIGN_IDENTITY=\"\""
          BUILD_CMD="$BUILD_CMD CODE_SIGNING_REQUIRED=NO"
          BUILD_CMD="$BUILD_CMD ONLY_ACTIVE_ARCH=YES"
          BUILD_CMD="$BUILD_CMD build"
          
          echo "Running: $BUILD_CMD"
          eval $BUILD_CMD
          
          APP_PATH=$(find "$DERIVED_DATA_PATH" -name "*.app" -type d | head -1)
          echo "Found app: $APP_PATH"
          
          if [ -n "$APP_PATH" ]; then
            cd ..
            mkdir -p build/Payload
            cp -R "$APP_PATH" build/Payload/
            cd build
            zip -rq "$BUILD_ID.ipa" Payload
            rm -rf Payload
            echo "Created IPA: build/$BUILD_ID.ipa"
          else
            echo "Error: No .app found in DerivedData"
            find "$DERIVED_DATA_PATH" -name "*.app" -type d 2>/dev/null || true
            exit 1
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: build/*.ipa
          retention-days: 7
          if-no-files-found: error

      - name: Build summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Build ID:** ${{ inputs.build_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          if [ -f build/*.ipa ]; then
            IPA_PATH=$(find build -name "*.ipa" -type f | head -1)
            echo "- **IPA Size:** $(ls -lh "$IPA_PATH" | awk '{print $5}')" >> $GITHUB_STEP_SUMMARY
          fi
