name: iOS Build (Capacitor)
on:
  push:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Unique build identifier'
        required: true
        type: string
      ios_path:
        description: 'Path to iOS project'
        required: false
        type: string
        default: '.'
      scheme:
        description: 'Xcode scheme to build'
        required: false
        type: string
        default: ''
      use_signing:
        description: 'Enable code signing'
        required: false
        type: boolean
        default: false
      configuration:
        description: 'Build configuration'
        required: false
        type: string
        default: 'Debug'
      flutter_version:
        description: 'Flutter version'
        required: false
        type: string
        default: ''
jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './inkroad-app/package-lock.json'
      - name: Install dependencies
        run: |
          cd inkroad-app
          npm install --legacy-peer-deps
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'
      - name: Expo Prebuild
        run: |
          cd inkroad-app
          npx expo prebuild --platform ios --no-install
      - name: Hardcode Metro IP
        run: |
          cd inkroad-app/ios
          APP_DELEGATE=$(find . -name "AppDelegate.mm" -o -name "AppDelegate.m" | head -n 1)
          echo "Found AppDelegate at $APP_DELEGATE"
          # React Native Packager를 GitHub Actions 환경이 아닌 사용자 로컬 PC IP로 연결하도록 강제 설정
          sed -i '' 's|return \[\[RCTBundleURLProvider sharedSettings\].*;|return \[NSURL URLWithString:@"http://192.168.45.59:8081/.expo/.virtual-metro-entry.bundle?platform=ios\&dev=true\&minify=false"\];|g' "$APP_DELEGATE"
      - name: Install CocoaPods
        run: |
          cd inkroad-app/ios
          pod install
      - name: Build App
        run: |
          set -e
          cd inkroad-app/ios
          # Read the workspace name (generated by Expo)
          WORKSPACE_NAME=$(ls -d *.xcworkspace)
          SCHEME_NAME=$(basename "$WORKSPACE_NAME" .xcworkspace)
          echo "Building Workspace: $WORKSPACE_NAME with Scheme: $SCHEME_NAME"
          DERIVED_DATA_PATH="${GITHUB_WORKSPACE}/DerivedData"
          
          # For development with builder.exe and React Native hot reloading, we MUST build in Debug configuration
          xcodebuild build -workspace "$WORKSPACE_NAME" -scheme "$SCHEME_NAME" -configuration Debug -destination 'generic/platform=iOS' -derivedDataPath "$DERIVED_DATA_PATH" CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO ONLY_ACTIVE_ARCH=YES COMPILER_INDEX_STORE_ENABLE=NO
          
          # Find the .app file
          APP_PATH=$(find "$DERIVED_DATA_PATH" -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: No .app found."
            exit 1
          fi
          
          cd ../..
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          cd build
          zip -rq "${{ inputs.build_id || github.sha }}.ipa" Payload
          rm -rf Payload
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/*.ipa
          retention-days: 5
          if-no-files-found: error
