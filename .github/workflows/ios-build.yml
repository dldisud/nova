name: iOS Build (Expo)
on:
  push:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Unique build identifier'
        required: true
        type: string
      ios_path:
        description: 'Path to Expo app workspace'
        required: false
        type: string
        default: 'inkroad-app'
      scheme:
        description: 'Xcode scheme to build'
        required: false
        type: string
        default: ''
      use_signing:
        description: 'Enable code signing'
        required: false
        type: boolean
        default: false
      configuration:
        description: 'Build configuration'
        required: false
        type: string
        default: 'Debug'
jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 45
    env:
      EXPO_APP_DIR: ${{ inputs.ios_path || 'inkroad-app' }}
      XCODE_CONFIGURATION: ${{ inputs.configuration || 'Debug' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './${{ env.EXPO_APP_DIR }}/package-lock.json'
      - name: Install dependencies
        run: |
          cd "$EXPO_APP_DIR"
          npm install --legacy-peer-deps
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'
      - name: Expo Prebuild
        run: |
          cd "$EXPO_APP_DIR"
          npx expo prebuild --platform ios --no-install
      - name: Install CocoaPods
        run: |
          cd "$EXPO_APP_DIR/ios"
          pod install
      - name: Build App
        run: |
          set -e
          cd "$EXPO_APP_DIR/ios"
          # Read the workspace name (generated by Expo)
          WORKSPACE_NAME=$(ls -d *.xcworkspace)
          SCHEME_NAME="${{ inputs.scheme }}"
          if [ -z "$SCHEME_NAME" ]; then
            SCHEME_NAME=$(basename "$WORKSPACE_NAME" .xcworkspace)
          fi
          echo "Building Workspace: $WORKSPACE_NAME with Scheme: $SCHEME_NAME"
          DERIVED_DATA_PATH="${GITHUB_WORKSPACE}/DerivedData"

          xcodebuild build -workspace "$WORKSPACE_NAME" -scheme "$SCHEME_NAME" -configuration "$XCODE_CONFIGURATION" -destination 'generic/platform=iOS' -derivedDataPath "$DERIVED_DATA_PATH" CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO ONLY_ACTIVE_ARCH=YES COMPILER_INDEX_STORE_ENABLE=NO
          
          # Find the .app file
          APP_PATH=$(find "$DERIVED_DATA_PATH" -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: No .app found."
            exit 1
          fi
          
          cd ../..
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          cd build
          zip -rq "${{ inputs.build_id || github.sha }}.ipa" Payload
          rm -rf Payload
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/*.ipa
          retention-days: 5
          if-no-files-found: error
