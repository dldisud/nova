<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>INKROAD | 내 정보</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard/dist/web/static/pretendard.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
  <link rel="stylesheet" href="assets/pc.css">
</head>
<body class="pc-desktop store-light">
  <div class="creator-layout">
    <aside class="creator-sidebar">
      <div class="creator-sidebar-brand">
        <img src="assets/logo-icon.png" style="width:32px; height:32px; object-fit:contain; margin-right:12px;" alt="INKROAD Logo">
        <span class="brand-copy">
          <strong class="brand-name">INKROAD</strong>
          <span class="brand-sub">크리에이터</span>
        </span>
      </div>
      <nav class="creator-sidebar-nav">
        <a class="creator-nav-link" href="creator_dashboard_pc.html">
          <span class="material-symbols-outlined">auto_stories</span> 작품 관리
        </a>
        <a class="creator-nav-link active" href="profile_settings_pc.html">
          <span class="material-symbols-outlined">person</span> 내 정보
        </a>
        <a class="creator-nav-link" href="author_dashboard_pc.html">
          <span class="material-symbols-outlined">bar_chart</span> 통계
        </a>
        <a class="creator-nav-link" href="novel_upload_pc.html">
          <span class="material-symbols-outlined">add_circle</span> 작품 등록
        </a>
        <a class="creator-nav-link" href="episode_upload_pc.html">
          <span class="material-symbols-outlined">upload</span> 회차 업로드
        </a>
      </nav>
      <div class="creator-sidebar-footer">
        <div data-lang-picker></div>
        <a href="homepage_pc.html">← 스토어로 돌아가기</a>
      </div>
    </aside>

    <main class="creator-main">
      <section class="auth-shell" data-profile-auth></section>

      <section class="creator-dashboard-shell" data-profile-dashboard hidden>
        <div class="creator-main-head">
          <div class="creator-main-copy">
            <h1 class="creator-main-title">내 정보</h1>
            <p class="creator-main-sub">프로필, 알림 설정, 계정 환경을 관리합니다.</p>
          </div>
        </div>

        <div class="summary-grid" data-profile-stats>
          <article class="summary-card">
            <span class="summary-card-icon material-symbols-outlined">person</span>
            <strong class="summary-card-value" data-profile-name>-</strong>
            <span class="summary-card-label">닉네임</span>
          </article>
          <article class="summary-card">
            <span class="summary-card-icon material-symbols-outlined">email</span>
            <strong class="summary-card-value" data-profile-email>-</strong>
            <span class="summary-card-label">이메일</span>
          </article>
          <article class="summary-card">
            <span class="summary-card-icon material-symbols-outlined">calendar_today</span>
            <strong class="summary-card-value" data-profile-joined>-</strong>
            <span class="summary-card-label">가입일</span>
          </article>
        </div>

        <!-- Profile Section -->
        <section class="studio-panel profile-section">
          <h2 class="profile-section-title">
            <span class="material-symbols-outlined">badge</span>
            프로필 설정
          </h2>
          <form class="profile-form" data-profile-form>
            <div class="profile-form-grid">
              <label class="creator-field">
                <span>닉네임 <span class="required">*</span></span>
                <input type="text" data-profile-pen-name placeholder="독자에게 표시될 닉네임" required>
                <span class="creator-field-hint">독자에게 표시되는 이름입니다. (2~20자)</span>
              </label>
              <label class="creator-field">
                <span>소개 문구</span>
                <input type="text" data-profile-bio placeholder="작가 소개를 간단히 작성해보세요." maxlength="100">
                <span class="creator-field-hint">작품 상세 페이지에 표시됩니다. (최대 100자)</span>
              </label>
            </div>
            <div class="creator-sale-actions">
              <button class="button primary" type="submit" data-profile-save>프로필 저장</button>
              <p class="creator-sale-status" data-profile-status hidden></p>
            </div>
          </form>
        </section>

        <!-- Notification Settings -->
        <section class="studio-panel profile-section">
          <h2 class="profile-section-title">
            <span class="material-symbols-outlined">notifications</span>
            알림 설정
          </h2>
          <div class="profile-notifications" data-profile-notifications>
            <label class="profile-notification-item">
              <div class="notification-copy">
                <span class="notification-title">댓글 알림</span>
                <span class="notification-desc">내 작품에 새 댓글이 달리면 알려드립니다.</span>
              </div>
              <input type="checkbox" data-profile-notify-comments checked>
            </label>
            <label class="profile-notification-item">
              <div class="notification-copy">
                <span class="notification-title">답글 알림</span>
                <span class="notification-desc">내 댓글에 답글이 달리면 알려드립니다.</span>
              </div>
              <input type="checkbox" data-profile-notify-replies checked>
            </label>
            <label class="profile-notification-item">
              <div class="notification-copy">
                <span class="notification-title">좋아요 알림</span>
                <span class="notification-desc">내 작품에 좋아요가 추가되면 알려드립니다.</span>
              </div>
              <input type="checkbox" data-profile-notify-likes checked>
            </label>
            <label class="profile-notification-item">
              <div class="notification-copy">
                <span class="notification-title">세일 알림</span>
                <span class="notification-desc">내 작품의 세일이 등록/종료되면 알려드립니다.</span>
              </div>
              <input type="checkbox" data-profile-notify-sales checked>
            </label>
            <label class="profile-notification-item">
              <div class="notification-copy">
                <span class="notification-title">작품 구매 알림</span>
                <span class="notification-desc">독자가 내 작품을 구매하면 알려드립니다.</span>
              </div>
              <input type="checkbox" data-profile-notify-purchases checked>
            </label>
            <label class="profile-notification-item">
              <div class="notification-copy">
                <span class="notification-title">이메일 알림</span>
                <span class="notification-desc">중요한 업데이트를 이메일로 받습니다.</span>
              </div>
              <input type="checkbox" data-profile-notify-email>
            </label>
          </div>
          <div class="creator-sale-actions">
            <button class="button primary" type="button" data-notification-save>알림 설정 저장</button>
            <p class="creator-sale-status" data-notification-status hidden></p>
          </div>
        </section>

        <!-- Account Settings -->
        <section class="studio-panel profile-section">
          <h2 class="profile-section-title">
            <span class="material-symbols-outlined">settings</span>
            계정 설정
          </h2>
          <div class="profile-account-settings" data-profile-account>
            <div class="profile-form-grid">
              <label class="creator-field">
                <span>이메일</span>
                <input type="email" data-profile-account-email readonly disabled>
                <span class="creator-field-hint">이메일은 변경할 수 없습니다. 변경이 필요하면 관리자에게 문의하세요.</span>
              </label>
              <label class="creator-field">
                <span>계정 상태</span>
                <input type="text" data-profile-account-status readonly disabled>
              </label>
            </div>
            <div class="profile-form-grid">
              <label class="creator-field">
                <span>언어 설정</span>
                <select data-profile-language>
                  <option value="ko">한국어</option>
                  <option value="en">English</option>
                  <option value="ja">日本語</option>
                  <option value="zh">中文</option>
                </select>
              </label>
              <label class="creator-field">
                <span>작가 모드</span>
                <select data-profile-author-mode>
                  <option value="standard">일반 모드</option>
                  <option value="creator">크리에이터 모드</option>
                </select>
                <span class="creator-field-hint">크리에이터 모드에서는 작품 관리 기능을 모두 사용할 수 있습니다.</span>
              </label>
            </div>
          </div>
          <div class="creator-sale-actions">
            <button class="button primary" type="button" data-account-save">설정 저장</button>
            <p class="creator-sale-status" data-account-status hidden></p>
          </div>
        </section>

        <!-- Danger Zone -->
        <section class="studio-panel profile-section profile-danger-zone">
          <h2 class="profile-section-title profile-danger-title">
            <span class="material-symbols-outlined">warning</span>
            위험한 작업
          </h2>
          <div class="profile-danger-actions">
            <div class="danger-item">
              <div class="danger-copy">
                <strong>계정 탈퇴</strong>
                <p>계정을 삭제하면 모든 작품과 데이터가 영구적으로 삭제됩니다.</p>
              </div>
              <button class="button danger" type="button" data-delete-account>계정 탈퇴</button>
            </div>
          </div>
        </section>
      </section>
    </main>
  </div>

  <script src="assets/i18n.js"></script>
  <script src="assets/supabase-config.js"></script>
  <script src="assets/app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/supabase-live.js"></script>
  <script src="assets/store-redesign.js"></script>
  <script src="assets/profile-settings.js"></script>
</body>
</html>
