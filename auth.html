<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>INKROAD | 로그인</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard/dist/web/static/pretendard.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
  <link rel="stylesheet" href="assets/mobile-auth.css">
</head>
<body class="mobile-app store-light mobile-auth-page">
  <header class="mh-header">
    <a class="back-btn" href="homepage.html"><span class="material-symbols-outlined">arrow_back</span></a>
    <span class="mh-header-title">로그인</span>
    <div class="spacer"></div>
  </header>

  <main class="mh-content mobile-auth-shell">
    <!-- Login View -->
    <div class="auth-view" data-auth-login>
      <div class="auth-header">
        <h1>INKROAD</h1>
        <p>글로벌 웹소설 스토어에 오신 것을 환영합니다.</p>
      </div>

      <div class="auth-error" data-auth-error hidden></div>

      <form class="auth-form" data-auth-form>
        <label class="auth-field">
          <span class="auth-label">이메일</span>
          <input type="email" class="auth-input" data-auth-email placeholder="email@example.com" required>
        </label>

        <label class="auth-field">
          <span class="auth-label">비밀번호</span>
          <input type="password" class="auth-input" data-auth-password placeholder="비밀번호를 입력하세요" required>
        </label>

        <button class="auth-btn primary full" type="submit" data-auth-submit>로그인</button>
      </form>

      <div class="auth-divider">또는</div>

      <div class="auth-social">
        <button class="auth-btn secondary full" type="button" data-auth-google>Google로 계속</button>
        <button class="auth-btn kakao full" type="button" data-auth-kakao>카카오로 계속</button>
      </div>

      <div class="auth-footer-link">
        계정이 없으신가요? <a data-auth-toggle="signup">회원가입</a>
      </div>
    </div>

    <!-- Signup View -->
    <div class="auth-view" data-auth-signup hidden>
      <div class="auth-header">
        <h1>회원가입</h1>
        <p>INKROAD와 함께 새로운 이야기를 시작하세요.</p>
      </div>

      <div class="auth-error" data-auth-error-signup hidden></div>

      <form class="auth-form" data-auth-signup-form>
        <label class="auth-field">
          <span class="auth-label">이메일</span>
          <input type="email" class="auth-input" data-signup-email placeholder="email@example.com" required>
        </label>

        <label class="auth-field">
          <span class="auth-label">비밀번호</span>
          <input type="password" class="auth-input" data-signup-password placeholder="6자 이상 입력하세요" required>
        </label>

        <label class="auth-field">
          <span class="auth-label">비밀번호 확인</span>
          <input type="password" class="auth-input" data-signup-password-confirm placeholder="비밀번호를 다시 입력하세요" required>
        </label>

        <label class="auth-field">
          <span class="auth-label">닉네임</span>
          <input type="text" class="auth-input" data-signup-pen-name placeholder="독자에게 표시될 이름" required>
        </label>

        <button class="auth-btn primary full" type="submit" data-signup-submit>가입하기</button>
      </form>

      <div class="auth-footer-link">
        이미 계정이 있으신가요? <a data-auth-toggle="login">로그인</a>
      </div>
    </div>
  </main>

  <script src="assets/i18n.js"></script>
  <script src="assets/supabase-config.js"></script>
  <script src="assets/app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/supabase-live.js"></script>
  <script src="assets/mobile-auth.js"></script>
</body>
</html>
